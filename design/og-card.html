<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Schibsted+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #2c3b46;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 80px;
  }
  .wordmark {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 100px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #efe6d6;
  }
  .rule {
    width: 56px;
    height: 2px;
    background: #c47a5d;
    margin: 40px 0 36px;
  }
  .tagline {
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 52px;
    color: #efe6d6;
  }
  .descriptor {
    font-family: 'Schibsted Grotesk', sans-serif;
    font-weight: 400;
    font-size: 31px;
    line-height: 1.45;
    color: #93a0a6;
    max-width: 780px;
    text-wrap: balance;
    margin-top: 26px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Foxhole Partners</div>
    <div class="rule"></div>
    <div class="tagline">Every leader needs someone in the foxhole.</div>
    <div class="descriptor">Strategy, operations, and communications for companies, campaigns, and causes.</div>
  </div>
</body>
</html>
